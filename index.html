<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Home | My Website</title>

  <style>
    :root{
      --bg: #f5f5f7;
      --text: #1d1d1f;
      --accent: #0071e3;
      --accent-soft: rgba(0,113,227,0.10);
      --border: rgba(0,0,0,0.08);
    }

    *{
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body{
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display",
                   Avenir, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container{
      width: min(1180px, 92%);
      margin: 0 auto;
    }

    header{
      background: rgba(255,255,255,0.72);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
    }

    .header-inner{
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0;
    }

    /* 🔥 NEW LOGO + TITLE */
    .logo-title{
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-title img{
      width: 32px;
      height: 32px;
      object-fit: contain;
    }

    .logo-title h1{
      font-size: 20px;
      margin: 0;
    }

    nav{
      display: flex;
      gap: 12px;
    }

    nav a{
      text-decoration: none;
      padding: 10px 16px;
      border-radius: 999px;
      color: var(--text);
      transition: 0.25s;
    }

    nav a:hover{
      background: var(--accent-soft);
      color: var(--accent);
    }

    nav a.active{
      background: var(--accent-soft);
      color: var(--accent);
    }

    .hero{
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: calc(100vh - 70px);
    }

    .hero-card{
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .hero-card img{
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s ease;
    }

    .hero-card:hover img{
      transform: scale(1.1);
    }

    .hero-card::after{
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.5), transparent);
    }

    .hero-text{
      position: absolute;
      bottom: 40px;
      left: 40px;
      color: white;
      z-index: 2;
      font-size: 48px;
      font-weight: 700;
    }

    @media(max-width:768px){
      .hero{
        grid-template-columns: 1fr;
      }

      .hero-card{
        height: 300px;
      }

      .hero-text{
        font-size: 28px;
        left: 20px;
        bottom: 20px;
      }
    }

  </style>
</head>

<body>

<header>
  <div class="container header-inner">

    <div class="logo-title">
      <img src="images/Florlogo1.png" alt="Logo">
      <h1>My Website</h1>
    </div>

    <nav>
      <a href="index.html" class="active">Home</a>
      <a href="aboutme.html">About Me</a>
      <a href="gallery.html">Gallery</a>
    </nav>

  </div>
</header>

<section class="hero">

  <div class="hero-card">
    <img src="images/Run1.png" alt="Run Image">
  </div>

  <div class="hero-card">
    <img src="images/Run2.png" alt="Fly Image">
  </div>

</section>

</body>
</html>
